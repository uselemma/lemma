  }
  .spin {
    transform-origin: 50px 50px;
    animation: hg-spin 25.714s linear infinite; /* 360deg / 14deg-per-s (HarmographFigure.tsx:20) */
  }
  @keyframes hg-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) {
    .hl { animation: none; stroke-dashoffset: 0; opacity: 0.6; }
    .spin { animation: none; }
  }
</style>
